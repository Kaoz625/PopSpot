mutation CreateIdea($title: String!, $problem: String!, $solution: String!, $targetMarket: String!, $businessModelCanvas: String, $competitorAnalysis: String, $initialFinancials: String) @auth(level: USER) {
  idea_insert(data: {
    title: $title,
    problem: $problem,
    solution: $solution,
    targetMarket: $targetMarket,
    businessModelCanvas: $businessModelCanvas,
    competitorAnalysis: $competitorAnalysis,
    initialFinancials: $initialFinancials,
		userId_expr: "auth.uid",
    createdAt_expr: "request.time"
  })
}

query ListResources @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  resources {
    id
    title
    description
    url
    type
    tags
  }
}

mutation UpdateUserBio($bio: String) @auth(level: USER) {
  user_update(key: {id_expr: "auth.uid"}, data: {bio: $bio})
}

query GetMyIdeas @auth(level: USER) {
  ideas(where: {userId: {eq_expr: "auth.uid"}}) {
    id
    title
    problem
    solution
    targetMarket
  }
}